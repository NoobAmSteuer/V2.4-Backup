    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}

    M400   # finishes all pending moves/process the buffer
    G28 Y
    
    # Move away
    G91
    G1 Y-15 F1200
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  
  {% if "z" not in printer.toolhead.homed_axes %}    #if z isnt homed
    SET_KINEMATIC_POSITION Z=1 SET_HOMED=Z
    G1 Z11 F1200
    {% set variable_Forced_Z = true %}
  {% endif %}

  {% if home_all or 'X' in params %}
    {% if "x" not in printer.toolhead.homed_axes %}    #if x isnt homed
      _HOME_X
    {% else %}
      _HOME_NMB_X
    {% endif %}
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    {% if "y" not in printer.toolhead.homed_axes %}    #if y isnt homed
      _HOME_Y
    {% else %}
      _HOME_NMB_Y
    {% endif %}
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    G90
    G1 X175 Y175 F15000
    G28 Z
    G1 Z10 F1500
  {% elif variable_Forced_Z == true %}          #if z wasnt homed
    G90
    G1 X175 Y175 F15000
    G28 Z
    G1 Z10 F1500
  {% endif %}


[gcode_macro _CG28]
description: Homing only if necessary
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
